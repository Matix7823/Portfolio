<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Accès Non Autorisé</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      background: #050505;
      color: #ff3333;
      font-family: 'JetBrains Mono', monospace;
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .glitch-container {
      text-align: center;
      padding: 3rem 2rem;
      border: 1px solid #ff3333;
      background: rgba(255, 0, 0, 0.05);
      box-shadow: 0 0 30px rgba(255, 0, 0, 0.2), inset 0 0 20px rgba(255, 0, 0, 0.1);
      max-width: 600px;
      width: 90%;
    }
    h1 {
      font-size: 5rem;
      margin: 0 0 1rem;
      text-shadow: 2px 2px 10px rgba(255, 0, 0, 0.5);
    }
    p {
      font-size: 1rem;
      line-height: 1.8;
      margin-bottom: 2.5rem;
      color: #ff9999;
    }
    .back-btn {
      display: inline-block;
      color: #000;
      background: #ff3333;
      text-decoration: none;
      padding: 1rem 2rem;
      font-weight: 700;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .back-btn:hover {
      background: #ff6666;
      box-shadow: 0 0 20px rgba(255, 51, 51, 0.5);
      transform: translateY(-2px);
    }
    .scanline {
      width: 100%;
      height: 100px;
      z-index: 9999;
      position: absolute;
      pointer-events: none;
      background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(255,51,51,0.2) 50%, rgba(0,0,0,0) 100%);
      opacity: 0.3;
      animation: scanline 4s linear infinite;
    }
    @keyframes scanline {
      0% { top: -100px; }
      100% { top: 100vh; }
    }
  </style>
</head>
<body>
  <div class="scanline"></div>
  <div class="glitch-container">
    <h1>404</h1>
    <p>
      [!] ERREUR CRITIQUE : ACCÈS NON AUTORISÉ.<br><br>
      Une tentative d'intrusion a été bloquée. Le chemin demandé n'existe pas ou a été restreint.<br>
      Votre adresse IP a été enregistrée dans nos journaux de sécurité.
    </p>
    <a href="index.html" class="back-btn">Retourner en lieu sûr</a>
  </div>
</body>
</html>
